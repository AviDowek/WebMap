<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebMap Benchmark Results</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    margin: 0;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #8b949e;
    font-size: 15px;
    margin-bottom: 32px;
  }
  .chart-container {
    width: 900px;
    height: 500px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 32px;
  }
  .chart-container-small {
    width: 900px;
    height: 400px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 32px;
  }
  .footer {
    color: #484f58;
    font-size: 13px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<h1>WebMap CUA Benchmark Results</h1>
<p class="subtitle">420 tasks across 20 real websites &middot; 7 documentation injection methods</p>

<div class="chart-container">
  <canvas id="successChart"></canvas>
</div>

<div class="chart-container-small">
  <canvas id="speedChart"></canvas>
</div>

<div class="chart-container-small">
  <canvas id="tokenChart"></canvas>
</div>

<p class="footer">github.com/AviDowek/WebMap</p>

<script>
const methods = ['Baseline', 'Micro Guide', 'Full Guide', 'First Message', 'Pre-Plan', 'A11y Tree', 'Hybrid'];
const successRates = [55.0, 53.3, 50.0, 58.3, 51.7, 61.7, 48.3];
const durations = [119.5, 121.7, 124.3, 118.5, 107.0, 41.4, 98.0];
const tokens = [120339, 120529, 131191, 132331, 105497, 142768, 381972];
const steps = [10.1, 10.0, 10.5, 9.8, 9.1, 5.0, 7.5];

const colors = successRates.map((r, i) => {
  if (i === 5) return '#3fb950'; // A11y Tree - green (winner)
  if (r >= 55) return '#58a6ff'; // above baseline - blue
  if (r >= 50) return '#d29922'; // below baseline - yellow
  return '#f85149'; // worst - red
});

const colorsAlpha = colors.map(c => c + '99');

// Success Rate Chart
new Chart(document.getElementById('successChart'), {
  type: 'bar',
  data: {
    labels: methods,
    datasets: [{
      label: 'Success Rate (%)',
      data: successRates,
      backgroundColor: colorsAlpha,
      borderColor: colors,
      borderWidth: 2,
      borderRadius: 6,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      title: {
        display: true,
        text: 'Task Success Rate by Method',
        color: '#e6edf3',
        font: { size: 18, weight: '600' },
        padding: { bottom: 16 }
      },
      legend: { display: false },
      tooltip: {
        callbacks: {
          afterLabel: (ctx) => {
            const i = ctx.dataIndex;
            return `${steps[i]} avg steps · ${durations[i]}s avg duration`;
          }
        }
      }
    },
    scales: {
      y: {
        beginAtZero: true,
        max: 75,
        ticks: { color: '#8b949e', callback: v => v + '%', font: { size: 13 } },
        grid: { color: '#21262d' },
      },
      x: {
        ticks: { color: '#e6edf3', font: { size: 13, weight: '500' } },
        grid: { display: false },
      }
    },
    animation: { duration: 800, easing: 'easeOutQuart' }
  },
  plugins: [{
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      chart.data.datasets[0].data.forEach((value, i) => {
        const meta = chart.getDatasetMeta(0);
        const bar = meta.data[i];
        const delta = i === 0 ? '' : (value - 55.0) > 0 ? `+${(value - 55.0).toFixed(1)}pp` : `${(value - 55.0).toFixed(1)}pp`;
        ctx.fillStyle = '#e6edf3';
        ctx.font = 'bold 14px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(value + '%', bar.x, bar.y - 10);
        if (delta) {
          ctx.fillStyle = (value - 55.0) > 0 ? '#3fb950' : '#f85149';
          ctx.font = '12px -apple-system, sans-serif';
          ctx.fillText(delta, bar.x, bar.y - 26);
        }
      });
    }
  }]
});

// Duration Chart
const durColors = durations.map((d, i) => {
  if (i === 5) return '#3fb950';
  if (d <= 107) return '#58a6ff';
  if (d <= 120) return '#d29922';
  return '#f85149';
});

new Chart(document.getElementById('speedChart'), {
  type: 'bar',
  data: {
    labels: methods,
    datasets: [{
      label: 'Avg Duration (seconds)',
      data: durations,
      backgroundColor: durColors.map(c => c + '99'),
      borderColor: durColors,
      borderWidth: 2,
      borderRadius: 6,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      title: {
        display: true,
        text: 'Average Task Duration by Method',
        color: '#e6edf3',
        font: { size: 18, weight: '600' },
        padding: { bottom: 16 }
      },
      legend: { display: false },
    },
    scales: {
      y: {
        beginAtZero: true,
        ticks: { color: '#8b949e', callback: v => v + 's', font: { size: 13 } },
        grid: { color: '#21262d' },
      },
      x: {
        ticks: { color: '#e6edf3', font: { size: 13, weight: '500' } },
        grid: { display: false },
      }
    }
  },
  plugins: [{
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      chart.data.datasets[0].data.forEach((value, i) => {
        const meta = chart.getDatasetMeta(0);
        const bar = meta.data[i];
        ctx.fillStyle = '#e6edf3';
        ctx.font = 'bold 13px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(value + 's', bar.x, bar.y - 8);
      });
    }
  }]
});

// Token Chart
const tokColors = tokens.map((t, i) => {
  if (i === 4) return '#3fb950'; // Pre-Plan lowest
  if (t <= 132000) return '#58a6ff';
  if (t <= 150000) return '#d29922';
  return '#f85149';
});

new Chart(document.getElementById('tokenChart'), {
  type: 'bar',
  data: {
    labels: methods,
    datasets: [{
      label: 'Avg Tokens per Task',
      data: tokens,
      backgroundColor: tokColors.map(c => c + '99'),
      borderColor: tokColors,
      borderWidth: 2,
      borderRadius: 6,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      title: {
        display: true,
        text: 'Average Token Usage by Method',
        color: '#e6edf3',
        font: { size: 18, weight: '600' },
        padding: { bottom: 16 }
      },
      legend: { display: false },
    },
    scales: {
      y: {
        beginAtZero: true,
        ticks: {
          color: '#8b949e',
          callback: v => (v / 1000).toFixed(0) + 'K',
          font: { size: 13 }
        },
        grid: { color: '#21262d' },
      },
      x: {
        ticks: { color: '#e6edf3', font: { size: 13, weight: '500' } },
        grid: { display: false },
      }
    }
  },
  plugins: [{
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      chart.data.datasets[0].data.forEach((value, i) => {
        const meta = chart.getDatasetMeta(0);
        const bar = meta.data[i];
        ctx.fillStyle = '#e6edf3';
        ctx.font = 'bold 13px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText((value / 1000).toFixed(0) + 'K', bar.x, bar.y - 8);
      });
    }
  }]
});
</script>
</body>
</html>
